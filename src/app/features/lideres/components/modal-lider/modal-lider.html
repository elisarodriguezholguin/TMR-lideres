<div class="modal-overlay" *ngIf="mostrarFormulario" (click)="cerrar()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <!-- HEADER -->
    <div class="modal-header">
      <h2 class="modal-title">
        {{ modoEdicion ? 'Editar Líder' : 'Nuevo Líder' }}
      </h2>
      <button class="modal-close" (click)="cerrar()">
        <span class="material-icons">close</span>
      </button>
    </div>

    <!-- BODY -->
    <div class="modal-body">

      <div class="section-title">
        <span class="section-line"></span>
        Información General
      </div>

      <div class="form-row" *ngIf="modoEdicion">
        <div class="select-wrapper select-wrapper--half" [class.input-error]="enviado && !form.estado">
          <select class="form-input" [(ngModel)]="form.estado">
            <option value="">Estado</option>
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
          </select>
          <span class="error-msg" *ngIf="enviado && !form.estado">Campo requerido</span>
        </div>
      </div>

      <div class="form-row">
        <div class="select-wrapper" [class.input-error]="enviado && !form.tipo">
          <select class="form-input" [(ngModel)]="form.tipo">
            <option value="">Tipo de líder</option>
            <option value="Interno">Interno</option>
            <option value="Externo">Externo</option>
          </select>
          <span class="error-msg" *ngIf="enviado && !form.tipo">Campo requerido</span>
        </div>
        <div class="select-wrapper" [class.input-error]="enviado && !form.persona">
          <select class="form-input" [(ngModel)]="form.persona">
            <option value="">Persona</option>
            <option value="1">Maribel Sofía Cabezas Paredes</option>
            <option value="2">Leonel Pablo Catro Jiménez</option>
            <option value="3">Diego Armando Maradona Carchi</option>
            <option value="4">Óscar Mario Suárez Torres</option>
          </select>
          <span class="error-msg" *ngIf="enviado && !form.persona">Campo requerido</span>
        </div>
      </div>

      <div class="section-title">
        <span class="section-line"></span>
        Datos de contacto
      </div>

      <div class="form-row">
        <div class="input-wrapper" [class.input-error]="enviado && !form.nombres">
          <input type="text" class="form-input" placeholder="Nombres" [(ngModel)]="form.nombres">
          <span class="error-msg" *ngIf="enviado && !form.nombres">Campo requerido</span>
        </div>
        <div class="input-wrapper" [class.input-error]="enviado && !form.apellidos">
          <input type="text" class="form-input" placeholder="Apellidos" [(ngModel)]="form.apellidos">
          <span class="error-msg" *ngIf="enviado && !form.apellidos">Campo requerido</span>
        </div>
      </div>

      <div class="form-row">
        <div class="input-wrapper" [class.input-error]="enviado && !form.correo">
          <input type="email" class="form-input" placeholder="Correo electrónico" [(ngModel)]="form.correo">
          <span class="error-msg" *ngIf="enviado && !form.correo">Campo requerido</span>
        </div>
        <div class="input-wrapper" [class.input-error]="enviado && !form.telefono">
          <input type="text" class="form-input" placeholder="Teléfono" [(ngModel)]="form.telefono">
          <span class="error-msg" *ngIf="enviado && !form.telefono">Campo requerido</span>
        </div>
      </div>

      <div class="button-container">
        <button class="btn-guardar" (click)="onGuardar()">
          <span *ngIf="modoEdicion" class="material-icons">save</span>
          {{ modoEdicion ? 'Guardar cambios' : 'Agregar líder +' }}
        </button>
      </div>

    </div>
  </div>
</div>
