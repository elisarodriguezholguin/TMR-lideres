<div class="detalle-overlay" (click)="cerrar()">
  <div class="detalle-card" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="detalle-header">
      <div class="detalle-codigo">{{ lider?.codigo }}</div>
      <button class="detalle-close" (click)="cerrar()">
        <span class="material-icons">close</span>
      </button>
    </div>

    <!-- Nombre y estado -->
    <div class="detalle-nombre-row">
      <h2 class="detalle-nombre">{{ lider?.nombre }}</h2>
      <span class="badge-estado" [class.badge-activo]="lider?.estado === 'Activo'"
        [class.badge-inactivo]="lider?.estado !== 'Activo'">
        <span class="badge-circulo"></span>
        {{ lider?.estado }}
      </span>
    </div>

    <!-- Tipo y cliente -->
    <div class="detalle-info-row">
      <div class="detalle-info-item">
        <div class="detalle-icon-wrapper">
          <img src="icons/user.svg" class="detalle-icon" />
          <img *ngIf="lider?.tipo === 'Externo'"
               src="icons/arrow-up-right.svg"
               class="detalle-icon-arrow" />
        </div>
        <span>{{ lider?.tipo }}</span>
      </div>
      <div class="detalle-info-item">
        <img src="icons/building-07-svgrepo-com.svg" class="detalle-icon" />
        <span>{{ lider?.cliente }}</span>
      </div>
    </div>

    <!-- Datos de contacto -->
    <div class="detalle-seccion-titulo">
      <span class="detalle-linea-azul"></span>
      Datos de contacto
    </div>

    <div class="detalle-contacto-grid">
      <div class="detalle-contacto-item">
        <span class="detalle-contacto-label">
          <img src="icons/email-svgrepo-com.svg" class="detalle-icon-sm" />
          Correo electrónico
        </span>
        <span class="detalle-contacto-valor azul">{{ lider?.correo }}</span>
      </div>
      <div class="detalle-contacto-item">
        <span class="detalle-contacto-label">
          <img src="icons/phone-svgrepo-com.svg" class="detalle-icon-sm" />
          Teléfono
        </span>
        <span class="detalle-contacto-valor azul">{{ lider?.telefono }}</span>
      </div>
    </div>

  </div>
</div>
